server {
    listen 80;
    server_name instagrambot.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name instagrambot.live;

    # SSL certs managed by certbot
    ssl_certificate /etc/letsencrypt/live/instagrambot.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/instagrambot.live/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Upload size for knowledge base
    client_max_body_size 10m;

    # API and webhook -> FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    location /webhook {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /privacy {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend static files
    location / {
        root /opt/instabot/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|svg|png|jpg|ico)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
